<!DOCTYPE html>
<html lang="fr-CH">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="assets/logo.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/site.css">

  <title>Vrai / Faux | Parcours des jeux</title>
  <link rel="stylesheet" href="css/pages/vrai-faux.css">
</head>
<body>
  <div id="header-slot"></div>
  <div class="layout">
    <main class="main" id="main">
      <div class="container">

        <div class="page-header fade-up">
          <div class="page-icon">✅</div>
          <h1>Vrai ou Faux</h1>
          <p>Lisez l’affirmation, puis Choisis vrai ou faux.</p>
        </div>

        <!-- KPIs -->
        <div class="kpi-grid fade-up delay-1">
          <div class="kpi-card">
            <div class="kpi-value" id="kpiCorrect">0</div>
            <div class="kpi-label">Corrects</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-value" id="kpiErrors">0</div>
            <div class="kpi-label">Erreurs</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-value" id="kpiXP">0</div>
            <div class="kpi-label">XP gagnes</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-value" id="kpiStreak">0🔥</div>
            <div class="kpi-label">Serie</div>
          </div>
        </div>

        <!-- Quick Play Toggle (Phase 5) -->
        <div class="quick-play-toggle fade-up delay-1" style="display:flex;gap:8px;justify-content:center;margin-bottom:24px;">
          <button id="btnModeComplete" class="btn btn-secondary btn-sm active" type="button">Session complete</button>
          <button id="btnModeQuick" class="btn btn-secondary btn-sm" type="button">Rapide (5 questions)</button>
        </div>

        <!-- Zone de jeu -->
        <div class="game-zone fade-up delay-2" id="gameZone">
          <div class="vf-zone">

            <div class="quiz-top">
              <div class="quiz-progress-label">
                Progression <strong id="qNum">0</strong> / <strong id="qTotal">0</strong>
              </div>
              <div class="quiz-timer" id="prog-pct">0%</div>
            </div>

            <div class="series-progress">
              <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
            </div>

            <!-- Historique visuel -->
            <div class="streak-bar" id="streakBar"></div>
            <div class="category-pill-row">
              <span class="badge badge-blue" id="qCategory"></span>
            </div>

            <!-- Carte -->
            <div class="vf-card" id="vfCard">
              <div class="vf-statement" id="qStatement"></div>
            </div>

            <!-- Feedback -->
            <div class="vf-feedback" id="vfFeedback"></div>

            <!-- Explication -->
            <div class="vf-result" id="vfResult"></div>

            <!-- Boutons -->
            <div class="vf-buttons">
              <button class="btn-vrai" id="btnVrai" type="button">Vrai</button>
              <button class="btn-faux" id="btnFaux" type="button">Faux</button>
            </div>

            <div class="vf-actions">
              <button class="btn btn-primary" id="btnNext" type="button" style="display:none;">Suivant</button>
            </div>

            <div class="key-hint">
              Raccourcis : <kbd>V</kbd> = Vrai &nbsp;|&nbsp; <kbd>F</kbd> = Faux
            </div>

          </div>
        </div>

        <!-- Resultats finaux -->
        <div class="result-zone fade-up" id="resultZone">
          <div class="card card-accent card-lg" style="text-align:center;">
            <div style="font-size:56px;margin-bottom:16px;" id="resEmoji">✅</div>
            <h2 style="font-family:var(--font-head);font-size:24px;font-weight:800;margin-bottom:8px;" id="resTitle">Session terminee !</h2>
            <p style="color:var(--text2);margin-bottom:28px;" id="resSubtitle"></p>
            <div class="kpi-grid" style="margin-bottom:28px;">
              <div class="kpi-card"><div class="kpi-value" id="resCorrect">0</div><div class="kpi-label">Corrects</div></div>
              <div class="kpi-card"><div class="kpi-value" id="resErrors">0</div><div class="kpi-label">Erreurs</div></div>
              <div class="kpi-card"><div class="kpi-value" id="resXP">0</div><div class="kpi-label">XP</div></div>
              <div class="kpi-card"><div class="kpi-value" id="resAccuracy">0%</div><div class="kpi-label">Precision</div></div>
              <div class="kpi-card"><div class="kpi-value" id="resBestStreak">0</div><div class="kpi-label">Meilleure serie</div></div>
            </div>
            <!-- Recapitulatif des erreurs -->
            <div id="errorRecap" style="text-align:left;margin-bottom:24px;display:none;">
              <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);margin-bottom:10px;">A retenir</div>
              <div id="errorList" style="display:flex;flex-direction:column;gap:8px;"></div>
            </div>
            <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:12px;">
              <button class="btn btn-ghost btn-sm btn-share" type="button">Copier mon resume</button>
            </div>
            <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
              <button class="btn btn-primary btn-lg" id="btnNextExercise" type="button">Exercice suivant</button>
              <button class="btn btn-secondary btn-lg" id="btnRestart" type="button">Rejouer</button>
              <a href="accueil.html" class="btn btn-secondary btn-lg">← Accueil</a>
            </div>
          </div>
        </div>

      </div>
    </main>
    <div id="footer-slot"></div>
  </div>

  <script src="js/data/vrai-faux-data.js"></script>
  <script src="js/score.js"></script>
  <script src="js/exercises-config.js"></script>
  <script src="js/stages.js"></script>
  <script src="js/exercise-utils.js"></script>
  <script src="js/automation.js"></script>
  <script src="js/shared.js"></script>
  <script src="js/ui.js"></script>
  <script>
  'use strict';

  /* =========================================================
     AFFIRMATIONS
     answer : true = vrai, false = faux
     explication : correction affichee apres reponse
  ========================================================= */
  const STATEMENTS = window.VRAI_FAUX_DATA;

  const PAGE_ID      = 'jeu-vrai-faux';
  const Q_PER_SESSION = Array.isArray(STATEMENTS) ? STATEMENTS.length : 0;

  let quickPlayMode = false;

  let session = {
    questions:   [],
    index:       0,
    correct:     0,
    errors:      0,
    xp:          0,
    typed:       0,
    streak:      0,
    bestStreak:  0,
    answered:    false,
    history:     [],  // 'ok' | 'err' | 'skip' pour chaque question
    wrongOnes:   [],  // questions ratees pour recap
  };
  let autoAdvanceTimer = null;

  function clearAutoAdvance() {
    if (autoAdvanceTimer) {
      clearTimeout(autoAdvanceTimer);
      autoAdvanceTimer = null;
    }
  }

  function scheduleAutoAdvance(callback, delay = 1300) {
    clearAutoAdvance();
    autoAdvanceTimer = setTimeout(() => {
      autoAdvanceTimer = null;
      callback();
    }, delay);
  }

  let xpRulesShown = false;

  /* ===== UTILS ===== */
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  /* ===== PHASE 5: ADAPTIVE DIFFICULTY ===== */
  function getAdaptiveDifficulty(page) {
    const m = typeof ScoreManager !== 'undefined' ? ScoreManager.readMetrics(page) : { typed: 0, correct: 0 };
    const acc = m.typed > 0 ? Math.round((m.correct / m.typed) * 100) : 0;
    return acc > 85 ? 'hard' : acc > 60 ? 'medium' : 'easy';
  }

  function filterByDifficulty(statements, targetDiff) {
    if (targetDiff === 'hard') return statements;
    if (targetDiff === 'medium') return statements.filter(s => s.difficulty !== 'hard');
    return statements.filter(s => s.difficulty === 'easy');
  }

  /* ===== INIT ===== */
  function startSession() {
    clearAutoAdvance();
    if (!Q_PER_SESSION) {
      showToast('Aucune question disponible dans les donnees.', 'error');
      return;
    }
    startExerciseSession(PAGE_ID);
    // Phase 5.3: Adaptive difficulty
    const selection = window.ContentProfiles
      ? window.ContentProfiles.buildSessionPool(PAGE_ID, STATEMENTS, { level: 'A2' })
      : null;
    const targetDiff = selection ? '' : getAdaptiveDifficulty(PAGE_ID);
    let filtered = selection ? selection.items : filterByDifficulty(STATEMENTS, targetDiff);
    if (filtered.length === 0) filtered = STATEMENTS;

    // Phase 5.2: Mode Quick Play - prendre seulement 5 questions si active
    const pool = quickPlayMode ? shuffle(filtered).slice(0, 5) : shuffle(filtered);

    session.questions  = pool;
    session.index      = 0;
    session.correct    = 0;
    session.errors     = 0;
    session.xp         = 0;
    session.typed      = 0;
    session.streak     = 0;
    session.bestStreak = 0;
    session.answered   = false;
    session.history    = [];
    session.wrongOnes  = [];

    document.getElementById('resultZone').classList.remove('show');
    document.getElementById('gameZone').classList.remove('hidden');
    updateKPIs();

    // Afficher les regles XP seulement a la premiere session
    if (!xpRulesShown) {
      xpRulesShown = true;
      showXPRules('Vrai ou Faux');
    }

    loadQuestion();
  }

  /* ===== CHARGER UNE QUESTION ===== */
  function loadQuestion() {
    clearAutoAdvance();
    session.answered = false;

    const q = session.questions[session.index];

    document.getElementById('qNum').textContent       = session.index + 1;
    document.getElementById('qTotal').textContent     = session.questions.length;
    document.getElementById('qCategory').textContent  = q.category;
    document.getElementById('qStatement').textContent = q.statement;
    document.getElementById('vfFeedback').textContent = '';
    document.getElementById('vfFeedback').className   = 'vf-feedback';
    document.getElementById('vfResult').className     = 'vf-result';
    document.getElementById('vfResult').textContent   = '';
    document.getElementById('btnVrai').disabled       = false;
    document.getElementById('btnFaux').disabled       = false;
    document.getElementById('btnNext').style.display  = 'none';

    const card = document.getElementById('vfCard');
    card.classList.remove('result-vrai', 'result-faux');

    const pct = Math.round((session.index / session.questions.length) * 100);
    document.getElementById('prog-pct').textContent = pct + '%';
    document.getElementById('progressFill').style.width = pct + '%';

    renderStreakBar();
  }

  /* ===== REPONDRE ===== */
  function answer(userSaysTrue) {
    if (session.answered) return;
    session.answered = true;
    session.typed++;

    const q    = session.questions[session.index];
    const isOk = (userSaysTrue === q.answer);

    document.getElementById('btnVrai').disabled = true;
    document.getElementById('btnFaux').disabled = true;

    const card = document.getElementById('vfCard');
    const fb   = document.getElementById('vfFeedback');

    if (isOk) {
      session.correct++;
      session.streak++;
      if (session.streak > session.bestStreak) session.bestStreak = session.streak;
      session.history.push('ok');

      const streakBonus = session.streak >= 3 ? 1 : 0;
      const xp = 2 + streakBonus;
      session.xp += xp;

      fb.textContent = '✅ Correct !' + (session.streak >= 3 ? ' Serie de ' + session.streak + " d'affilee !" : '') + ' +' + xp + ' XP';
      fb.className   = 'vf-feedback ok';
      card.classList.add('result-vrai');

      recordExerciseProgress(PAGE_ID, { correct: 1, typed: 1, errors: 0, xp });
    } else {
      session.errors++;
      session.streak = 0;
      session.history.push('err');
      session.wrongOnes.push(q);

      fb.textContent = '❌ Incorrect !';
      fb.className   = 'vf-feedback err';
      card.classList.add('result-faux');

      card.classList.add('shake');
      setTimeout(() => card.classList.remove('shake'), 400);

      recordExerciseProgress(PAGE_ID, { correct: 0, typed: 1, errors: 1, xp: 0 });
    }

    showResult(q, isOk);
    showNextBtn();
    updateKPIs();
    renderStreakBar();
  }

  function showResult(q, isOk) {
    const box = document.getElementById('vfResult');
    box.textContent = q.explication;
    box.className = 'vf-result ' + (isOk ? 'ok' : 'err');
  }

  function showNextBtn() {
    scheduleAutoAdvance(nextQuestion);
  }

  /* ===== STREAK BAR ===== */
  function renderStreakBar() {
    const bar = document.getElementById('streakBar');
    bar.innerHTML = '';
    for (let i = 0; i < session.questions.length; i++) {
      const dot = document.createElement('div');
      dot.className = 'streak-dot' + (session.history[i] ? ' ' + session.history[i] : '');
      bar.appendChild(dot);
    }
  }

  /* ===== SUIVANT ===== */
  function nextQuestion() {
    if (!session.answered) return;
    session.index++;
    if (session.index >= session.questions.length) {
      finishSession();
    } else {
      loadQuestion();
    }
  }

  /* ===== FIN ===== */
  function finishSession() {
    clearAutoAdvance();
    endExerciseSession(PAGE_ID);

    document.getElementById('prog-pct').textContent = '100%';
    document.getElementById('progressFill').style.width = '100%';
    document.getElementById('gameZone').classList.add('hidden');
    document.getElementById('resultZone').classList.add('show');

    const accuracy = calcAccuracy(session.correct, session.typed);
    let emoji = '📚', title = 'Continue a t\'entrainer !';
    if (accuracy === 100) { emoji = '🏆'; title = 'Parfait ! Score 100% !'; }
    else if (accuracy >= 85) { emoji = '🎉'; title = 'Excellent !'; }
    else if (accuracy >= 70) { emoji = '👍'; title = 'Tres bien !'; }
    else if (accuracy >= 50) { emoji = '😐'; title = 'Pas mal !'; }

    document.getElementById('resEmoji').textContent    = emoji;
    document.getElementById('resTitle').textContent    = title;
    document.getElementById('resSubtitle').textContent = session.correct + ' / ' + session.questions.length + ' corrects — ' + accuracy + '% de precision';
    document.getElementById('resCorrect').textContent  = session.correct;
    document.getElementById('resErrors').textContent   = session.errors;
    document.getElementById('resXP').textContent       = session.xp;
    document.getElementById('resAccuracy').textContent = accuracy + '%';
    document.getElementById('resBestStreak').textContent = session.bestStreak;

    // Recap des erreurs
    if (session.wrongOnes.length > 0) {
      const recap = document.getElementById('errorRecap');
      const list  = document.getElementById('errorList');
      recap.style.display = 'block';
      list.innerHTML = '';
      session.wrongOnes.forEach(q => {
        const item = document.createElement('div');
        item.style.cssText = 'padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);font-size:13px;';
        item.innerHTML = `<div style="color:var(--text);font-weight:600;margin-bottom:4px;">${q.statement}</div>
          <div style="color:var(--success);font-size:12px;">→ ${q.answer ? 'VRAI' : 'FAUX'} — ${q.explication}</div>`;
        list.appendChild(item);
      });
    }

    if (accuracy >= 80) launchConfetti();
  }

  /* ===== KPIs ===== */
  function updateKPIs() {
    document.getElementById('kpiCorrect').textContent = session.correct;
    document.getElementById('kpiErrors').textContent  = session.errors;
    document.getElementById('kpiXP').textContent      = session.xp;
    document.getElementById('kpiStreak').textContent  = session.streak + (session.streak >= 3 ? '🔥' : '');
  }

  async function runAutomatedTest() {
    const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
    startSession();
    for (let guard = 0; guard < 130 && !document.getElementById('resultZone').classList.contains('show'); guard++) {
      answer(session.questions[session.index].answer);
      if (session.answered) nextQuestion();
      await wait(20);
    }
    return {
      done: document.getElementById('resultZone').classList.contains('show'),
      correct: document.getElementById('resCorrect').textContent,
      accuracy: document.getElementById('resAccuracy').textContent
    };
  }

  window.__GAME_TEST_API__ = { run: runAutomatedTest };

  /* ===== EVENTS ===== */
  document.addEventListener('DOMContentLoaded', () => {
    setupNextExerciseButton(PAGE_ID);
        
    // Phase 5: Quick Play toggle
    document.getElementById('btnModeComplete').addEventListener('click', () => {
      quickPlayMode = false;
      document.getElementById('btnModeComplete').classList.add('active');
      document.getElementById('btnModeQuick').classList.remove('active');
    });
    document.getElementById('btnModeQuick').addEventListener('click', () => {
      quickPlayMode = true;
      document.getElementById('btnModeQuick').classList.add('active');
      document.getElementById('btnModeComplete').classList.remove('active');
    });

    document.getElementById('btnVrai').addEventListener('click', () => answer(true));
    document.getElementById('btnFaux').addEventListener('click', () => answer(false));
    document.getElementById('btnNext').addEventListener('click', nextQuestion);
    setupRestartButton(startSession);

    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT') return;
      const key = e.key.toLowerCase();
      if ((key === 'v' || key === 'ArrowLeft') && !session.answered) answer(true);
      else if ((key === 'f' || key === 'ArrowRight') && !session.answered) answer(false);
    });

    startSession();
  });
  </script>
</body>
</html>
