<!DOCTYPE html>
<html lang="fr-CH">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="assets/logo.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/site.css">

  <title>Cherche &amp; clique | Parcours des jeux</title>
  <link rel="stylesheet" href="css/pages/cherche-clique.css">
</head>
<body>
  <div id="header-slot"></div>
  <div class="layout">
    <main class="main" id="main">
      <div class="container">

        <div class="page-header fade-up">
          <div class="page-icon">🖱️</div>
          <h1>Cherche et clique</h1>
          <p>Reperez l’icone demandee et cliquez dessus.</p>
        </div>

        <!-- KPI en temps reel -->
        <div class="kpi-grid fade-up delay-1">
          <div class="kpi-card">
            <div class="kpi-value" id="ccCorrect">0</div>
            <div class="kpi-label">Trouvees</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-value" id="ccErrors">0</div>
            <div class="kpi-label">Erreurs</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-value" id="ccXp">0 XP</div>
            <div class="kpi-label">XP gagne</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-value" id="ccAcc">0%</div>
            <div class="kpi-label">Precision</div>
          </div>
        </div>

        <!-- Zone cible -->
        <div class="target-zone fade-up delay-2">
          <div class="quiz-top">
            <div class="quiz-progress-label" id="targetStep">Progression 1/10</div>
            <div class="quiz-timer" id="ccProgressPct">0%</div>
          </div>
          <div class="series-progress cc-progress" aria-label="Progression">
            <div class="progress-bar">
              <div class="progress-fill" id="ccProgressFill" style="width:0%"></div>
            </div>
          </div>
          <div class="category-pill-row">
            <span class="badge badge-blue" id="targetCategory"></span>
          </div>
          <div class="target-topline">
            <button class="target-hint" id="btnHint" type="button">Indice</button>
          </div>
          <div class="target-label">Clique sur l’icone qui represente :</div>
          <div class="target-text" id="targetName">Loupe</div>
          <div class="target-clue" id="targetClue" aria-live="polite"></div>
          <div class="target-feedback" id="targetFeedback" aria-live="polite">Choisis une icone dans la grille.</div>
        </div>

        <!-- Grille de jeu -->
        <div class="fade-up delay-2" id="gameZone">
          <div class="game-grid" id="gameGrid"></div>
        </div>

        <!-- Zone resultats -->
        <div class="result-zone fade-up" id="resultZone">
          <div class="card card-accent card-lg" style="text-align:center;">
            <div id="resEmoji" style="font-size:48px;margin-bottom:12px;">🖱️</div>
            <h2 id="resTitle">Session terminee !</h2>
            <p id="resSubtitle" style="color:var(--text2);margin-bottom:16px;"></p>
            <div class="kpi-grid">
              <div class="kpi-card">
                <div class="kpi-value" style="color:var(--success)" id="resFinal">0</div>
                <div class="kpi-label">Trouvees</div>
              </div>
              <div class="kpi-card">
                <div class="kpi-value" style="color:var(--danger)" id="resFinalErr">0</div>
                <div class="kpi-label">Erreurs</div>
              </div>
              <div class="kpi-card">
                <div class="kpi-value" id="resFinalXp">0 XP</div>
                <div class="kpi-label">XP gagne</div>
              </div>
              <div class="kpi-card">
                <div class="kpi-value" id="resFinalAcc">0%</div>
                <div class="kpi-label">Precision</div>
              </div>
            </div>
            <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:16px;">
              <button class="btn btn-primary" id="btnRestart" type="button">🔁 Rejouer</button>
              <button class="btn btn-secondary" id="btnNextExercise" type="button">Exercice suivant '</button>
              <a href="accueil.html" class="btn btn-secondary">🏠 Accueil</a>
            </div>
          </div>
        </div>

      </div>
    </main>
    <div id="footer-slot"></div>
  </div>

  <script src="js/data/cherche-clique-data.js"></script>
  <script src="js/score.js"></script>
  <script src="js/exercises-config.js"></script>
  <script src="js/stages.js"></script>
  <script src="js/exercise-utils.js"></script>
  <script src="js/automation.js"></script>
  <script src="js/shared.js"></script>
  <script src="js/ui.js"></script>
  <script>
  'use strict';

  // Securite: verifier que les donnees sont chargees
  if (!window.CHERCHE_CLIQUE_DATA) {
    console.error('CHERCHE_CLIQUE_DATA non chargees - verifier le fichier js/data/cherche-clique-data.js');
    window.CHERCHE_CLIQUE_DATA = [];
  }

  const PAGE_ID = 'jeu-cherche-clique';
  const TOTAL_QUESTIONS = 10;

  let session = {
    correct: 0,
    errors: 0,
    xp: 0,
    currentNumber: 0,
    total: TOTAL_QUESTIONS,
    active: true,
    locked: false,
    errorsOnCurrent: 0
  };

  let allItems = [];
  let targetQueue = [];
  let currentTarget = null;

  /* -- Mettre a jour les KPI -- */
  function updateKpi() {
    document.getElementById('ccCorrect').textContent = session.correct;
    document.getElementById('ccErrors').textContent = session.errors;
    document.getElementById('ccXp').textContent = session.xp + ' XP';
    const accuracy = session.correct + session.errors > 0
      ? Math.round((session.correct / (session.correct + session.errors)) * 100)
      : 0;
    document.getElementById('ccAcc').textContent = accuracy + '%';
  }

  /* -- Initialiser le jeu -- */
  function initGame() {
    const data = window.CHERCHE_CLIQUE_DATA || [];
    if (!data || data.length === 0) {
      console.error('CHERCHE_CLIQUE_DATA not loaded');
      return;
    }
    const selection = window.ContentProfiles
      ? window.ContentProfiles.buildSessionPool(PAGE_ID, data, { level: 'A2' })
      : { items: shuffle(data).slice(0, Math.min(TOTAL_QUESTIONS, data.length)) };
    allItems = shuffle(selection.items);
    targetQueue = allItems.slice(0, Math.min(TOTAL_QUESTIONS, allItems.length));
    session = {
      correct: 0,
      errors: 0,
      xp: 0,
      currentNumber: 0,
      total: targetQueue.length,
      active: true,
      locked: false,
      errorsOnCurrent: 0
    };
    updateKpi();
    document.getElementById('resultZone').classList.remove('show');
    document.getElementById('gameZone').classList.remove('hidden');
    showQuestion();
    startExerciseSession(PAGE_ID);
  }

  /* -- Shuffle -- */
  function shuffle(arr) {
    const copy = [...arr];
    for (let i = copy.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
  }

  /* -- Rendre la grille -- */
  function renderGrid() {
    const grid = document.getElementById('gameGrid');
    grid.innerHTML = '';

    if (!currentTarget) return;

    const target = currentTarget;
    const columns = window.matchMedia('(max-width: 600px)').matches ? 3
      : window.matchMedia('(min-width: 1200px)').matches ? 5
      : 4;
    const wantedCount = columns * 4;

    // Remplir des lignes completes: la cible + des distracteurs.
    let subset = shuffle(allItems.filter(item => item.id !== target.id)).slice(0, Math.max(0, wantedCount - 1));
    subset.push(target);
    subset = shuffle(subset);

    subset.forEach((item) => {
      const el = document.createElement('button');
      el.type = 'button';
      el.className = 'game-item';
      el.setAttribute('aria-label', item.label);
      el.innerHTML = `<span class="game-icon" aria-hidden="true">${item.icon}</span>`;
      el.addEventListener('click', () => handleClick(item, el));
      grid.appendChild(el);
    });
  }

  /* -- Question suivante -- */
  function showQuestion() {
    if (session.currentNumber >= session.total) {
      endSession();
      return;
    }
    session.currentNumber++;
    session.locked = false;
    session.errorsOnCurrent = 0;
    currentTarget = targetQueue[session.currentNumber - 1];
    if (!currentTarget) {
      console.error('Target not found at question', session.currentNumber);
      return;
    }
    document.getElementById('targetName').textContent = currentTarget.label;
    document.getElementById('targetCategory').textContent = currentTarget.category || '';
    document.getElementById('targetClue').textContent = '';
    document.getElementById('targetFeedback').textContent = 'Choisis une icone dans la grille.';
    document.getElementById('targetFeedback').className = 'target-feedback';
    document.getElementById('btnHint').disabled = false;
    updateProgress();
    renderGrid();
  }

  function updateProgress() {
    const stepText = `${session.currentNumber}/${session.total}`;
    const pct = Math.round(((session.currentNumber - 1) / session.total) * 100);
    document.getElementById('targetStep').textContent = 'Progression ' + stepText;
    document.getElementById('ccProgressPct').textContent = pct + '%';
    document.getElementById('ccProgressFill').style.width = pct + '%';
  }

  /* -- Gerer le clic -- */
  function handleClick(item, element) {
    if (!session.active || session.locked || !currentTarget) return;
    const target = currentTarget;

    if (item.id === target.id) {
      // Correct !
      session.locked = true;
      session.correct++;
      session.xp += 3;
      element.classList.add('correct');
      document.getElementById('targetFeedback').textContent = 'Correct. Nouvelle cible...';
      document.getElementById('targetFeedback').className = 'target-feedback ok';
      document.getElementById('ccProgressPct').textContent = Math.round((session.currentNumber / session.total) * 100) + '%';
      document.getElementById('ccProgressFill').style.width =
        Math.round((session.currentNumber / session.total) * 100) + '%';
      recordExerciseProgress(PAGE_ID, { correct: 1, typed: 1, errors: 0, xp: 3 });
      updateKpi();
      setTimeout(() => {
        element.classList.remove('correct');
        showQuestion();
      }, 600);
    } else {
      // Erreur
      session.errors++;
      session.errorsOnCurrent++;
      element.classList.add('wrong');
      document.getElementById('targetFeedback').textContent =
        session.errorsOnCurrent >= 2
          ? 'Pas celle-ci. Utilisez Indice si vous etes bloque.'
          : 'Pas celle-ci. Essayez encore.';
      document.getElementById('targetFeedback').className = 'target-feedback err';
      recordExerciseProgress(PAGE_ID, { correct: 0, typed: 1, errors: 1, xp: 0 });
      updateKpi();
      setTimeout(() => {
        element.classList.remove('wrong');
      }, 300);
    }
  }

  /* -- Terminer la session -- */
  function endSession() {
    session.active = false;
    document.getElementById('gameZone').classList.add('hidden');
    document.getElementById('ccProgressPct').textContent = '100%';
    document.getElementById('ccProgressFill').style.width = '100%';
    document.getElementById('targetFeedback').textContent = 'Session terminee.';
    document.getElementById('resultZone').classList.add('show');

    const accuracy = session.correct + session.errors > 0
      ? Math.round((session.correct / (session.correct + session.errors)) * 100)
      : 0;

    let emoji = '🖱️';
    let title = 'Continue a t’entrainer !';
    if (accuracy === 100) { emoji = '🏆'; title = 'Parfait ! Score 100% !'; }
    else if (accuracy >= 80) { emoji = '🎉'; title = 'Excellent !'; }
    else if (accuracy >= 60) { emoji = '👍'; title = 'Tres bien !'; }
    else if (accuracy >= 40) { emoji = '🙂'; title = 'Pas mal !'; }

    document.getElementById('resEmoji').textContent = emoji;
    document.getElementById('resTitle').textContent = title;
    document.getElementById('resSubtitle').textContent =
      `Tu as trouve ${session.correct}/${session.total} icones. Precision : ${accuracy}%`;

    document.getElementById('resFinal').textContent = session.correct;
    document.getElementById('resFinalErr').textContent = session.errors;
    document.getElementById('resFinalXp').textContent = session.xp + ' XP';
    document.getElementById('resFinalAcc').textContent = accuracy + '%';

    if (accuracy >= 80) launchConfetti();

    endExerciseSession(PAGE_ID);

    setupNextExerciseButton(PAGE_ID, { labelSuffix: '' });
  }

  /* -- Bouton Rejouer -- */
  document.getElementById('btnRestart').addEventListener('click', () => {
    document.getElementById('resultZone').classList.remove('show');
    document.getElementById('gameZone').classList.remove('hidden');
    initGame();
  });

  /* -- Indice -- */
  document.getElementById('btnHint').addEventListener('click', () => {
    if (!session.active || session.locked || !currentTarget) return;
    document.getElementById('targetClue').textContent =
      'Indice : regardez du cote "' + currentTarget.category + '".';
    document.getElementById('targetFeedback').textContent = 'Continuez a chercher la bonne icone.';
    document.getElementById('targetFeedback').className = 'target-feedback';
    document.getElementById('btnHint').disabled = true;
  });

  /* -- Lancer le jeu au demarrage -- */
  document.addEventListener('DOMContentLoaded', () => {
    if (typeof StageManager !== 'undefined' && typeof ScoreManager !== 'undefined') {
      initGame();
    } else {
      setTimeout(() => initGame(), 100);
    }
  });

  </script>
</body>
</html>
